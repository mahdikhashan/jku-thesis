name: gla-bench
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  # Upgraded to match the 2026 stable requirements for pre-built FLA wheels
  - pytorch=2.7.*
  - pytorch-cuda=12.4
  - numpy
  - pip
  - pip:
      - flash-linear-attention
      - einops
      - transformers
      - datasets